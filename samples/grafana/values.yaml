# Grafana Helm chart values for Savras auth proxy deployment.
#
# Deploy with:
#   helm upgrade --install grafana grafana/grafana \
#     --namespace monitoring --create-namespace \
#     --values samples/kubernetes/values.yaml
#
# This configures:
#   - Auth proxy mode (X-WEBAUTH-USER/EMAIL headers from Savras)
#   - Auto-sign-up so new LDAP users are created in Grafana on first login
#   - Dashboard sidecar for configmap-based dashboard provisioning
#   - Post-start hook that triggers initial sync after Grafana starts

replicas: 1

# -- Grafana configuration overrides (GF_ environment variables)
grafana.ini:
  server:
    root_url: "http://localhost:4181"
  users:
    auto_assign_org: true
    auto_assign_org_role: Viewer
  auth.proxy:
    enabled: true
    header_name: X-WEBAUTH-USER
    header_property: username
    auto_sign_up: true
    header_email: X-WEBAUTH-EMAIL
    sync_ttl: 60
  log:
    level: info
    mode: console

# -- Persistence (disable for testing, enable for production)
persistence:
  enabled: false

# -- Service account for Savras to call the Grafana API
serviceAccount:
  create: true
  name: grafana-admin

# -- Dashboard sidecar (auto-load ConfigMaps with label grafana_dashboard)
sidecar:
  dashboards:
    enabled: true
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true

# -- Security context for init container
initChownData:
  securityContext:
    capabilities:
      add:
        - CHOWN
        - DAC_OVERRIDE
      drop:
        - ALL

# -- Post-start: give Savras time to boot, then trigger an initial sync
lifecycleHooks:
  postStart:
    exec:
      command:
        - /bin/sh
        - -c
        - |
          sleep 120 &&
          curl -s -XPOST http://127.0.0.1:4181/-/savras/sync/trigger

extraVolumes:
  - name: savras-config
    configMap:
      name: savras-config
      defaultMode: 0400

extraVolumeMounts:
  - name: savras-config
    mountPath: "/etc/savras"

extraContainers: |
  - name: proxy
    image: ghcr.io/magichuihui/savras:0.1.4
    env:
    - name: SAVRAS_AUTH_LOCAL_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: grafana
          key: admin-password
    ports:
    - name: proxy-web
      containerPort: 4181
    volumeMounts:
    - name: savras-config
      mountPath: "/etc/savras"

service:
  targetPort: 4181
